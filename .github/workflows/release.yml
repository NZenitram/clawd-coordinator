name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version match
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "v$PKG_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

  test:
    name: Test on ${{ matrix.os }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          COORD_LOG_LEVEL: silent

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            output: coord-linux-x64
          - target: linux-arm64
            runner: ubuntu-latest
            output: coord-linux-arm64
          - target: darwin-x64
            runner: macos-12
            output: coord-darwin-x64
          - target: darwin-arm64
            runner: macos-latest
            output: coord-darwin-arm64
          - target: win-x64
            runner: windows-latest
            output: coord-win-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install pkg
        run: npm install -g pkg@5.8.1

      - name: Build binary
        run: |
          pkg --compress Brotli \
              --targets node18-${{ matrix.target }} \
              --output "${{ matrix.output }}" \
              dist/cli/index.js
        shell: bash

      - name: Verify binary (unix)
        if: runner.os != 'Windows'
        run: |
          ls -lh "${{ matrix.output }}"
          # Skip execution test for cross-compiled ARM binaries on x64 runners
          if [[ "${{ matrix.target }}" != *"arm64"* ]]; then
            ./"${{ matrix.output }}" --version
          else
            echo "Skipping execution test for cross-compiled ARM binary"
            file "${{ matrix.output }}"
          fi

      - name: Verify binary (windows)
        if: runner.os == 'Windows'
        run: |
          dir "${{ matrix.output }}"
          "${{ matrix.output }}" --version
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.output }}
          retention-days: 1

  publish-npm:
    name: Publish to npm
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [publish-npm, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Flatten artifacts
        run: |
          mkdir -p release-binaries
          find binaries -type f -exec mv {} release-binaries/ \;
          ls -la release-binaries/

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"- %h %s" | head -20)
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..${{ github.ref }} --oneline --pretty=format:"- %h %s")
          fi
          {
            echo 'CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: release-binaries/*
          body: |
            ## Changes
            ${{ env.CHANGELOG }}

            ## Binaries
            - `coord-linux-x64` — Linux x86-64
            - `coord-linux-arm64` — Linux ARM64
            - `coord-darwin-x64` — macOS x86-64
            - `coord-darwin-arm64` — macOS ARM64 (Apple Silicon)
            - `coord-win-x64.exe` — Windows x86-64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
