name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version match
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "v$PKG_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

  test:
    name: Test on ${{ matrix.os }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          COORD_LOG_LEVEL: silent

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "${{ github.ref_name }}" | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"- %h %s" | head -20)
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..${{ github.ref_name }} --oneline --pretty=format:"- %h %s")
          fi
          {
            echo 'CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            npm install -g @soazcloud/clawd-coordinator
            ```

            ## Changes

            ${{ env.CHANGELOG }}
          draft: false
          prerelease: false
